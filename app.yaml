runtime: python312 
entrypoint: gunicorn -b :$PORT --workers 1 --threads 4 naes2026.wsgi
# Substitua "SEUPROJETO" pelo nome do seu projeto Django (o mesmo nome da pasta que tem o arquivo settings.py)

handlers:
- url: /static
  static_dir: static_gcloud/
- url: /.*
  script: auto

automatic_scaling:
  min_instances: 0
  max_instances: 2

# Configurações de ambiente para o Django
env_variables:
  NOME_DA_VARIAVEL: "Valor recebido"