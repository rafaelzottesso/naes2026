{% extends "website/modelo2.html" %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'campus-list' %}">Campi</a></li>
<li class="breadcrumb-item active" aria-current="page">Detalhes</li>
{% endblock breadcrumb %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-gradient-primary text-white py-3">
                <h4 class="mb-0 fs-5 stencil d-flex align-items-center"><i class="bi bi-building me-2 fs-4"></i>Detalhes do Campus</h4>
            </div>
            <div class="card-body p-4 text-center">
                <i class="bi bi-geo-alt fs-1 text-primary mb-3"></i>
                <h3 class="mb-2">{{ object.nome }}</h3>
                <p class="text-muted font-monospace">ID: #{{ object.pk }}</p>
            </div>
            <div class="card-footer bg-light p-3 text-center">
                <a href="#" class="btn btn-outline-secondary px-4" onclick="window.history.back()">
                    <i class="bi bi-arrow-left me-2"></i>Voltar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
